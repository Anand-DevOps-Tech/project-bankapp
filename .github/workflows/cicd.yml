
name: CI/CD Pipeline
# Trigger the workflow on push events to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  #step 1: compile job
  compile:
    name: compile java project
    runs-on: ubuntu-latest
    steps:
    # checkout the code from the repository
    - uses: actions/checkout@v4
    # setup jdk 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: compile the project
      run: mvn compile
  #step 2: security scan job
  security-scan:
    name: security scan
    runs-on: ubuntu-latest
    needs: compile # Run this job after the compile job is successful
    steps:
    # checkout the code from the repository
    - uses: actions/checkout@v4
    # install trivy
    - name: Install Trivy
      run: |
        sudo apt-get install wget gnupg
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update -y
        sudo apt-get install trivy -y
    # run trivy scan
    - name: Run Trivy Scan
      run: trivy fs --format table -o fs_scan_report.txt .
    # upload the trivy scan report as an artifact
    - name: Upload Trivy Scan Report
      uses: actions/upload-artifact@v4
      with:
        name: trivy-scan-report
        path: fs_scan_report.txt
